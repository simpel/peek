name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}
      tag: ${{ steps.release.outputs.new_release_git_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust (for lockfile generation)
        uses: dtolnay/rust-toolchain@stable

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/exec
            @semantic-release/git
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  build:
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release == 'true'

    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist
          cp "target/${TARGET}/release/peek" dist/
          cp "target/${TARGET}/release/peekd" dist/
          cp "target/${TARGET}/release/peek-wrap" dist/
          cp assets/com.peek.daemon.plist dist/
          tar -czf "peek-${TARGET}.tar.gz" -C dist .

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.semantic-release.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          gh release upload "$TAG" "peek-${TARGET}.tar.gz"

  update-homebrew:
    needs: [semantic-release, build]
    if: needs.semantic-release.outputs.new_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.semantic-release.outputs.tag }}
          VERSION: ${{ needs.semantic-release.outputs.version }}
        run: |
          curl -sL "https://github.com/simpel/peek/releases/download/${TAG}/peek-aarch64-apple-darwin.tar.gz" -o arm64.tar.gz
          SHA_ARM64=$(sha256sum arm64.tar.gz | cut -d' ' -f1)

          curl -sL "https://github.com/simpel/peek/releases/download/${TAG}/peek-x86_64-apple-darwin.tar.gz" -o x86_64.tar.gz
          SHA_X86=$(sha256sum x86_64.tar.gz | cut -d' ' -f1)

          git clone "https://x-access-token:${GH_TOKEN}@github.com/simpel/homebrew-tap.git"
          cd homebrew-tap

          mkdir -p Formula
          cat > Formula/peek.rb << FORMULA
          class Peek < Formula
            desc "Inline shell autocomplete daemon for package scripts and tools"
            homepage "https://github.com/simpel/peek"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/simpel/peek/releases/download/v${VERSION}/peek-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM64}"
              else
                url "https://github.com/simpel/peek/releases/download/v${VERSION}/peek-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86}"
              end
            end

            def install
              bin.install "peek"
              bin.install "peekd"
              bin.install "peek-wrap"
              prefix.install "com.peek.daemon.plist"
            end

            def post_install
              system bin/"peek", "setup"
            end

            service do
              run [opt_bin/"peekd"]
              keep_alive true
              log_path var/"log/peek.log"
              error_log_path var/"log/peek.log"
            end

            def caveats
              <<~EOS
                peek has been added to your shell config.
                Restart your terminal to activate.
              EOS
            end

            test do
              assert_match "Inline shell autocomplete", shell_output("#{bin}/peek --help")
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/peek.rb
          git commit -m "Update peek to ${VERSION}"
          git push
